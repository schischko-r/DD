document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);
    if (template.includes('\\"') || template.includes('\\n')) {
      template = template
        .replace(/\\n/g, '\n')
        .replace(/\\"/g, '"')
        .replace(/\\\//g, '/');
    }

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"\u003c!DOCTYPE html>\n\u003chtml>\n\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\u003cscript src=\"9310f388-19c6-43d1-8194-97c835fec495\">\u003c/script>\n\u003c/head>\n\u003cbody>\n\u003cx-dc>\n\u003chelmet>\n\u003cstyle>\n  *{box-sizing:border-box;}\n  body{margin:0;font-family:-apple-system,'SF Pro Display','SF Pro Text','Segoe UI',system-ui,sans-serif;background:#f5f5f7;-webkit-font-smoothing:antialiased;}\n  input::placeholder{color:#a1a1a6;}\n\u003c/style>\n\u003c/helmet>\n\n\u003cdiv style=\"min-height:100vh;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,'SF Pro Display','SF Pro Text','Segoe UI',system-ui,sans-serif;\">\n\n  \u003csc-if value=\"{{ feedback.open }}\" hint-placeholder-val=\"{{ false }}\">\n    \u003cdiv style=\"position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.28);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:24px;\">\n      \u003cdiv style=\"width:460px;max-width:100%;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.24);padding:22px;\">\n        \u003cdiv style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;\">\n          \u003cdiv>\n            \u003cdiv style=\"font-size:18px;font-weight:700;letter-spacing:-.02em;color:#1d1d1f;\">Форма обратной связи\u003c/div>\n            \u003cdiv style=\"font-size:13px;color:#86868b;margin-top:4px;letter-spacing:-.01em;\">Блок: {{ feedback.blockName }}\u003c/div>\n          \u003c/div>\n          \u003cbutton onClick=\"{{ onFeedbackClose }}\" style=\"flex:none;width:30px;height:30px;border-radius:9px;border:1px solid rgba(0,0,0,.08);background:#f5f5f7;color:#6e6e73;font-size:16px;line-height:1;cursor:pointer;\">×\u003c/button>\n        \u003c/div>\n        \u003ctextarea value=\"{{ feedback.text }}\" onInput=\"{{ onFeedbackText }}\" placeholder=\"Опишите ошибку в данных или логике блока\" style=\"width:100%;min-height:116px;resize:vertical;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:12px 13px;font-family:inherit;font-size:14px;line-height:1.4;outline:none;color:#1d1d1f;background:#fff;\">\u003c/textarea>\n        \u003csc-if value=\"{{ feedback.sent }}\" hint-placeholder-val=\"{{ false }}\">\n          \u003cdiv style=\"margin-top:10px;font-size:13px;font-weight:600;color:#248A3D;letter-spacing:-.01em;\">Спасибо, обратная связь отправлена.\u003c/div>\n        \u003c/sc-if>\n        \u003cdiv style=\"display:flex;justify-content:flex-end;gap:10px;margin-top:16px;\">\n          \u003cbutton onClick=\"{{ onFeedbackClose }}\" style=\"border:1px solid rgba(0,0,0,.1);background:#fff;color:#6e6e73;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;\">Закрыть\u003c/button>\n          \u003cbutton onClick=\"{{ onFeedbackSend }}\" style=\"border:none;background:#d70015;color:#fff;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 10px rgba(215,0,21,.22);\">Отправить\u003c/button>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/sc-if>\n\n  \u003c!-- top chrome -->\n  \u003cdiv style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;z-index:10;\">\n    \u003cdiv style=\"font-size:13px;color:#86868b;letter-spacing:-.01em;\">Инструменты&nbsp;·&nbsp;Аналитика продукта&nbsp;·&nbsp;\u003cspan style=\"color:#1d1d1f;font-weight:600;\">Data Driven Index\u003c/span>\u003c/div>\n    \u003cdiv style=\"display:flex;align-items:center;gap:14px;\">\n      \u003cdiv style=\"font-size:12px;color:{{ ddStatus.color }};white-space:nowrap;letter-spacing:-.01em;\">{{ ddStatus.text }}\u003c/div>\n      \u003cdiv onClick=\"{{ onRefresh }}\" style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#fff;background:{{ ui.ctaGrad }};border-radius:980px;padding:9px 17px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.16);letter-spacing:-.01em;white-space:nowrap;\">\n        \u003cspan style=\"font-size:14px;line-height:1;\">⟳\u003c/span>\u003cspan>Обновить DD-рейтинг\u003c/span>\n      \u003c/div>\n      \u003cdiv style=\"font-size:13px;color:#6e6e73;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:980px;padding:8px 15px;letter-spacing:-.01em;white-space:nowrap;\">{{ periodLabel }}\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv style=\"max-width:1180px;margin:0 auto;padding:36px 40px 72px;\">\n\n    \u003c!-- onboarding -->\n    \u003cdiv style=\"display:flex;gap:16px;align-items:center;margin-bottom:30px;\">\n      \u003cdiv style=\"flex:none;width:50px;height:50px;border-radius:14px;background:linear-gradient(160deg,#2bb84a,#178a2c);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;letter-spacing:-.02em;box-shadow:0 6px 16px rgba(0,0,0,.18);background:{{ ui.brandGrad }};\">DD\u003c/div>\n      \u003cdiv>\n        \u003cdiv style=\"font-size:21px;font-weight:700;letter-spacing:-.02em;\">Data Driven Index · Аналитика зрелости продукта\u003c/div>\n        \u003cdiv style=\"font-size:14px;color:#6e6e73;margin-top:3px;letter-spacing:-.01em;max-width:760px;\">Оценка, насколько продукт управляется данными. DD-рейтинг собирается из ключевых блоков. Найдите продукты чтобы сравнить между собой.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003c!-- search + complex analysis on one row -->\n    \u003cdiv style=\"font-size:12px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:#86868b;margin-bottom:12px;\">Продукты для анализа · выбрано {{ selectedCount }}\u003c/div>\n    \u003cdiv style=\"display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;\">\n      \u003cdiv style=\"flex:none;width:430px;max-width:100%;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:12px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);\">\n        \u003cspan style=\"font-size:16px;color:#a1a1a6;\">⌕\u003c/span>\n        \u003cinput value=\"{{ query }}\" onInput=\"{{ onSearch }}\" placeholder=\"Поиск продукта — вклад, счёт, ОМС…\" style=\"flex:1;background:transparent;border:none;outline:none;color:#1d1d1f;font-size:15px;font-family:inherit;letter-spacing:-.01em;\">\n      \u003c/div>\n      \u003csc-if value=\"{{ isSingle }}\" hint-placeholder-val=\"{{ true }}\">\n        \u003cdiv style=\"flex:1;min-width:300px;display:flex;align-items:center;justify-content:space-between;gap:20px;background:{{ ui.ctaGrad }};border-radius:16px;padding:15px 22px;box-shadow:0 8px 22px rgba(0,0,0,.18);\">\n          \u003cdiv style=\"min-width:0;\">\n            \u003cdiv style=\"font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Комплексный анализ по продукту\u003c/div>\n            \u003cdiv style=\"font-size:12.5px;color:rgba(255,255,255,.74);margin-top:4px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Метрики «{{ single.name }}» — выводы и точки роста\u003c/div>\n          \u003c/div>\n          \u003cdiv style=\"flex:none;background:#fff;color:{{ ui.btnText }};font-weight:700;font-size:13.5px;border-radius:12px;padding:12px 20px;white-space:nowrap;cursor:pointer;\">Посмотреть анализ →\u003c/div>\n        \u003c/div>\n      \u003c/sc-if>\n    \u003c/div>\n\n    \u003c!-- selected chips -->\n    \u003cdiv style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;\">\n      \u003csc-for list=\"{{ selectedChips }}\" as=\"p\" hint-placeholder-count=\"1\">\n        \u003cdiv onClick=\"{{ p.onToggle }}\" style=\"display:flex;align-items:center;gap:10px;border-radius:12px;padding:10px 14px;cursor:pointer;border:1px solid rgba(33,160,56,.4);background:rgba(33,160,56,.08);\">\n          \u003cspan style=\"flex:none;width:18px;height:18px;border-radius:6px;background:#21A038;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;\">✓\u003c/span>\n          \u003cspan style=\"font-size:14px;font-weight:600;color:#1d1d1f;letter-spacing:-.01em;\">{{ p.name }}\u003c/span>\n          \u003cspan style=\"font-size:12px;font-weight:700;padding:2px 8px;border-radius:7px;background:#fff;color:{{ p.scoreColor }};\">{{ p.score }}\u003c/span>\n          \u003cspan style=\"font-size:13px;color:#a1a1a6;margin-left:1px;\">✕\u003c/span>\n        \u003c/div>\n      \u003c/sc-for>\n    \u003c/div>\n\n    \u003c!-- search results -->\n    \u003csc-if value=\"{{ hasQuery }}\" hint-placeholder-val=\"{{ false }}\">\n      \u003cdiv style=\"margin-bottom:30px;\">\n        \u003cdiv style=\"font-size:12px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:#86868b;margin-bottom:11px;\">Результаты поиска · {{ resultCount }}\u003c/div>\n        \u003cdiv style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          \u003csc-for list=\"{{ resultChips }}\" as=\"p\" hint-placeholder-count=\"3\">\n            \u003cdiv onClick=\"{{ p.onToggle }}\" style=\"display:flex;align-items:center;gap:10px;border-radius:12px;padding:10px 14px;cursor:pointer;border:1px solid {{ p.border }};background:{{ p.bg }};\">\n              \u003cspan style=\"flex:none;width:18px;height:18px;border-radius:6px;border:1.5px solid {{ p.checkBorder }};background:{{ p.checkBg }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;\">{{ p.check }}\u003c/span>\n              \u003cspan style=\"font-size:14px;font-weight:600;color:#1d1d1f;letter-spacing:-.01em;\">{{ p.name }}\u003c/span>\n              \u003cspan style=\"font-size:12px;font-weight:700;padding:2px 8px;border-radius:7px;background:#f5f5f7;color:{{ p.scoreColor }};\">{{ p.score }}\u003c/span>\n            \u003c/div>\n          \u003c/sc-for>\n        \u003c/div>\n      \u003c/div>\n    \u003c/sc-if>\n\n    \u003c!-- related suggestions -->\n    \u003csc-if value=\"{{ hasSuggest }}\" hint-placeholder-val=\"{{ false }}\">\n      \u003cdiv style=\"margin-bottom:30px;\">\n        \u003cdiv style=\"font-size:12px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:#86868b;margin-bottom:11px;\">ПРОДУКТЫ В УПРАВЛЕНИИ ТОГО ЖЕ CPO\u003c/div>\n        \u003cdiv style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          \u003csc-for list=\"{{ suggestChips }}\" as=\"p\" hint-placeholder-count=\"3\">\n            \u003cdiv onClick=\"{{ p.onToggle }}\" style=\"display:flex;align-items:center;gap:9px;border-radius:12px;padding:10px 14px;cursor:pointer;border:1px dashed rgba(0,0,0,.18);background:#fff;\" style-hover=\"border-color:rgba(33,160,56,.5);background:rgba(33,160,56,.05);\">\n              \u003cspan style=\"font-size:15px;font-weight:700;color:#21A038;\">+\u003c/span>\n              \u003cspan style=\"font-size:14px;font-weight:600;color:#1d1d1f;letter-spacing:-.01em;\">{{ p.name }}\u003c/span>\n              \u003cspan style=\"font-size:12px;font-weight:700;padding:2px 8px;border-radius:7px;background:#f5f5f7;color:{{ p.scoreColor }};\">{{ p.score }}\u003c/span>\n            \u003c/div>\n          \u003c/sc-for>\n        \u003c/div>\n      \u003c/div>\n    \u003c/sc-if>\n    \u003csc-if value=\"{{ hasNoData }}\" hint-placeholder-val=\"{{ false }}\">\n      \u003cdiv style=\"background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:26px;box-shadow:0 1px 3px rgba(0,0,0,.04);\">\n        \u003cdiv style=\"font-size:17px;font-weight:700;color:#1d1d1f;letter-spacing:-.02em;\">{{ emptyTitle }}\u003c/div>\n        \u003cdiv style=\"font-size:13.5px;color:#86868b;margin-top:6px;letter-spacing:-.01em;line-height:1.4;\">{{ emptyText }}\u003c/div>\n      \u003c/div>\n    \u003c/sc-if>\n\n\n    \u003c!-- ===== SINGLE PRODUCT ===== -->\n    \u003csc-if value=\"{{ isSingle }}\" hint-placeholder-val=\"{{ true }}\">\n      \u003cdiv>\n        \u003c!-- rating header + recommendations -->\n        \u003cdiv style=\"display:grid;grid-template-columns:360px 1fr;gap:16px;margin-bottom:30px;align-items:stretch;\">\n\n          \u003cdiv style=\"display:flex;flex-direction:column;justify-content:center;gap:18px;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:22px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.05);\">\n            \u003cdiv style=\"font-size:12px;font-weight:500;color:#86868b;letter-spacing:-.01em;\">{{ single.name }}\u003c/div>\n            \u003cdiv style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n              \u003cdiv style=\"display:flex;align-items:baseline;gap:6px;min-width:0;\">\n                \u003cspan style=\"font-size:54px;font-weight:700;line-height:1;letter-spacing:-.04em;color:{{ single.levelColor }};\">{{ single.score }}\u003c/span>\n                \u003cspan style=\"font-size:15px;font-weight:600;color:#c7c7cc;\">/ 100\u003c/span>\n              \u003c/div>\n              \u003cdiv style=\"flex:none;text-align:right;\">\n                \u003cdiv style=\"font-size:18px;font-weight:700;color:{{ single.levelColor }};letter-spacing:-.02em;white-space:nowrap;\">{{ single.level }}\u003c/div>\n                \u003csc-if value=\"{{ single.hasDelta }}\" hint-placeholder-val=\"{{ false }}\">\u003cdiv style=\"font-size:13px;font-weight:600;color:{{ single.deltaColor }};margin-top:3px;white-space:nowrap;\">{{ single.delta }} кв/кв\u003c/div>\u003c/sc-if>\n              \u003c/div>\n            \u003c/div>\n            \u003cdiv>\n              \u003cdiv style=\"position:relative;height:12px;\">\n                \u003cdiv style=\"display:flex;gap:3px;height:100%;\">\n                  \u003cdiv style=\"flex:40;background:rgba(215,0,21,.16);border-radius:6px 2px 2px 6px;\">\u003c/div>\n                  \u003cdiv style=\"flex:21;background:rgba(232,115,12,.16);\">\u003c/div>\n                  \u003cdiv style=\"flex:20;background:rgba(224,161,0,.18);\">\u003c/div>\n                  \u003cdiv style=\"flex:19;background:rgba(36,138,61,.18);border-radius:2px 6px 6px 2px;\">\u003c/div>\n                \u003c/div>\n                \u003cdiv style=\"position:absolute;top:50%;left:{{ single.barPct }};transform:translate(-50%,-50%);width:7px;height:22px;border-radius:5px;background:{{ single.levelColor }};border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.3);\">\u003c/div>\n              \u003c/div>\n              \u003cdiv style=\"display:flex;gap:3px;margin-top:9px;font-size:10px;font-weight:600;color:#b0b0b5;letter-spacing:-.01em;\">\n                \u003cspan style=\"flex:40;\">Внимание\u003c/span>\n                \u003cspan style=\"flex:21;text-align:center;\">Развив.\u003c/span>\n                \u003cspan style=\"flex:20;text-align:center;\">Зрелые\u003c/span>\n                \u003cspan style=\"flex:19;text-align:right;\">Лидеры\u003c/span>\n              \u003c/div>\n            \u003c/div>\n          \u003c/div>\n\n          \u003cdiv style=\"background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:22px;padding:21px 24px;box-shadow:0 2px 12px rgba(0,0,0,.05);\">\n            \u003cdiv style=\"display:flex;align-items:center;gap:8px;margin-bottom:15px;\">\n              \u003cspan style=\"font-size:15px;\">💡\u003c/span>\n              \u003cdiv style=\"font-size:13px;font-weight:700;letter-spacing:-.01em;color:#1d1d1f;\">Рекомендации и фокусы для повышения DD-рейтинга\u003c/div>\n            \u003c/div>\n            \u003cdiv style=\"display:flex;flex-direction:column;gap:12px;\">\n              \u003csc-for list=\"{{ single.focuses }}\" as=\"f\" hint-placeholder-count=\"3\">\n                \u003cdiv style=\"display:flex;align-items:center;gap:13px;\">\n                  \u003cspan style=\"flex:none;width:24px;height:24px;border-radius:8px;background:{{ f.color }};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;\">{{ f.idx }}\u003c/span>\n                  \u003cdiv style=\"flex:1;min-width:0;\">\n                    \u003cdiv style=\"font-size:13.5px;font-weight:600;color:#1d1d1f;line-height:1.3;letter-spacing:-.01em;\">{{ f.action }}\u003c/div>\n                    \u003cdiv style=\"font-size:12px;color:#86868b;margin-top:1px;letter-spacing:-.01em;\">{{ f.name }} · сейчас {{ f.current }}\u003c/div>\n                  \u003c/div>\n                  \u003cspan style=\"flex:none;font-size:12px;font-weight:700;color:{{ f.gainColor }};background:{{ f.gainBg }};border-radius:8px;padding:5px 10px;white-space:nowrap;\">{{ f.gain }}\u003c/span>\n                \u003c/div>\n              \u003c/sc-for>\n            \u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        \u003cdiv style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;\">\n          \u003cdiv style=\"font-size:12px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:#86868b;\">Ключевые блоки DD-рейтинга\u003c/div>\n          \u003cdiv style=\"display:flex;gap:3px;background:#e9e9eb;border-radius:11px;padding:3px;\">\n            \u003cdiv onClick=\"{{ onDetail }}\" style=\"font-size:13px;font-weight:600;letter-spacing:-.01em;padding:7px 16px;border-radius:9px;cursor:pointer;color:{{ vbDetail.color }};background:{{ vbDetail.bg }};box-shadow:{{ vbDetail.sh }};\">Подробно\u003c/div>\n            \u003cdiv onClick=\"{{ onCompact }}\" style=\"font-size:13px;font-weight:600;letter-spacing:-.01em;padding:7px 16px;border-radius:9px;cursor:pointer;color:{{ vbCompact.color }};background:{{ vbCompact.bg }};box-shadow:{{ vbCompact.sh }};\">Компактно\u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        \u003cdiv style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:{{ ui.gap }};align-items:start 3c/div>\n                \u003c/div>\n              \u003c/sc-for>\n            \u003c/div>\n\n            \u003csc-for list=\"{{ compare.rows }}\" as=\"row\" hint-placeholder-count=\"8\">\n              \u003cdiv style=\"display:grid;grid-template-columns:{{ gridCols }};border-bottom:1px solid rgba(0,0,0,.05);\">\n                \u003cdiv style=\"padding:14px 20px;font-size:14px;font-weight:600;color:#1d1d1f;position:sticky;left:0;z-index:2;background:#fff;box-shadow:1px 0 0 rgba(0,0,0,.06);letter-spacing:-.01em;display:flex;flex-direction:column;justify-content:center;\">\n                  \u003cspan>{{ row.name }}\u003c/span>\n                  \u003cspan style=\"font-size:11px;color:#a1a1a6;font-weight:500;margin-top:2px;\">макс {{ row.maxTxt }}\u003c/span>\n                \u003c/div>\n                \u003csc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"2\">\n                  \u003cdiv style=\"padding:14px 20px;border-left:1px solid rgba(0,0,0,.05);display:flex;flex-direction:column;justify-content:center;gap:7px;\">\n                    \u003cdiv style=\"display:flex;align-items:baseline;gap:6px;\">\n                      \u003cspan style=\"font-size:15px;font-weight:700;color:{{ cell.color }};letter-spacing:-.01em;\">{{ cell.scoreText }}\u003c/span>\n                    \u003c/div>\n                    \u003cdiv style=\"height:5px;border-radius:5px;background:#ececed;overflow:hidden;\">\n                      \u003cdiv style=\"height:100%;width:{{ cell.barPct }};background:{{ cell.color }};border-radius:5px;\">\u003c/div>\n                    \u003c/div>\n                  \u003c/div>\n                \u003c/sc-for>\n              \u003c/div>\n            \u003c/sc-for>\n          \u003c/div>\n         \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/sc-if>\n\n  \u003c/div>\n\u003c/div>\n\u003c/x-dc>\n\u003cscript type=\"text/x-dc\" data-dc-script data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1180, &quot;height&quot;: 900 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Зелёный Сбер&quot;, &quot;Индиго&quot;, &quot;Графит&quot;], &quot;default&quot;: &quot;Зелёный Сбер&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;density&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Просторный&quot;, &quot;Компактный&quot;], &quot;default&quot;: &quot;Просторный&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;detail&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Подробно&quot;, &quot;Фокус&quot;], &quot;default&quot;: &quot;Подробно&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\n// Источник DD-рейтинга: файл dd-data.json рядом с Agent.html.\nconst DD_DATA_URL = 'dd-data.json';\nconst AB_TESTS_DEFAULT_URL = 'https://example.com/ab-tests';\n\nclass Component extends DCLogic {\n  state = {\n    selected: [], query: '', collapsed: {}, viewMode: 'Подробно',\n    feedback: { open:false, blockName:'', text:'', sent:false },\n    dd: null,\n    ddStatus: { text: 'Загружаю dd-data.json…', color: '#86868b' },\n  };\n\n  componentDidMount() {\n    this.refreshDD();\n  }\n\n  parseNumber(value, fallback = null) {\n    if (value === null || value === undefined || value === '') return fallback;\n    const n = Number(String(value).replace(',', '.'));\n    return Number.isFinite(n) ? n : fallback;\n  }\n\n  parseApplicable(row) {\n    const raw = row.is_metric_applicabble_flg !== undefined ? row.is_metric_applicabble_flg : row.is_metric_applicable_flg;\n    if (raw === undefined || raw === null || raw === '') return true;\n    if (typeof raw === 'boolean') return raw;\n    if (typeof raw === 'number') return raw !== 0;\n    const s = String(raw).trim().toLowerCase();\n    if (['false','0','no','n','нет','н','-'].includes(s)) return false;\n    if (['true','1','yes','y','да','д'].includes(s)) return true;\n    return Boolean(raw);\n  }\n\n  parseOptionalBoolean(value) {\n    if (value === undefined || value === null || value === '') return null;\n    if (typeof value === 'boolean') return value;\n    if (typeof value === 'number') return value !== 0;\n    const s = String(value).trim().toLowerCase();\n    if (['false','0','no','n','нет','н','-'].includes(s)) return false;\n    if (['true','1','yes','y','да','д'].includes(s)) return true;\n    return Boolean(value);\n  }\n\n  textValue(value) {\n    if (value === null || value === undefined) return '';\n    return String(value).trim();\n  }\n\n  firstText(row, keys) {\n    for (const key of keys) {\n      const v = this.textValue(row[key]);\n      if (v) return v;\n    }\n    return '';\n  }\n\n  linkLabel(type) {\n    const labels = {\n      navigator:'Отчёт в Навигаторе', campaigning:'Отчёт по кампейнингу', drafts:'Отчёт по черновикам', pilot_campaigns:'Отчет по Пилотным кампаниям', churn:'Отчёт по оттоку',\n      backlog:'Посмотреть бэклог', ab_tests:'Запустить A/B', self_service_pilot:'Запустить первый пилот Self-Service', losshunter:'LossHunter', datadriven:'Библиотека решений', generic:'Открыть ссылку'\n    };\n    return labels[type] || labels.generic;\n  }\n\n  metricLinks(row) {\n    const defs = [\n      { type:'navigator', label:'Отчёт в Навигаторе', keys:['navigator_report_url','navigator_url','report_navigator_url','navigator_link','navigator_report_link','nav_report_url','nav_url'] },\n      { type:'campaigning', label:'Отчёт по кампейнингу', keys:['campaigning_report_url','campaigning_url','campaign_report_url','campaign_url','camp_report_url','camp_url'] },\n      { type:'drafts', label:'Отчёт по черновикам', keys:['drafts_report_url','drafts_url','draft_report_url','draft_url','drafts_link'] },\n      { type:'pilot_campaigns', label:'Отчет по Пилотным кампаниям', keys:['pilot_campaigns_report_url','pilot_campaign_report_url','pilot_campaigns_url','pilot_campaign_url','pilot_report_url','pilot_campaigning_report_url','pilot_campaigning_url'] },\n      { type:'churn', label:'Отчёт по оттоку', keys:['churn_report_url','churn_url','outflow_report_url','outflow_url','retention_report_url'] },\n      { type:'backlog', label:'Посмотреть бэклог', keys:['backlog_url','backlog_link','backlog_report_url'] },\n      { type:'ab_tests', label:'Запустить A/B', keys:['ab_tests_url','ab_test_url','ab_tests_launch_url','ab_test_launch_url','ab_experiment_url','experiment_url'] },\n      { type:'self_service_pilot', label:'Запустить первый пилот Self-Service', keys:['self_service_pilot_url','selfservice_pilot_url','first_self_service_pilot_url','first_pilot_self_service_url','first_pilot_url','pilot_self_service_url','self_service_campaign_url'] },\n      { type:'losshunter', label:'LossHunter', keys:['losshunter_url','loss_hunter_url','losshunter_link','loss_hunter_link','cx_analysis_url'] },\n      { type:'datadriven', label:'Библиотека решений', keys:['datadriven_library_url','library_url','solutions_library_url'] },\n    ];\n    const links = [];\n    const push = (type, label, url, color = 'blue') => {\n      const cleanUrl = this.textValue(url);\n      if (!cleanUrl) return;\n      const cleanType = this.textValue(type) || 'generic';\n      const cleanLabel = this.textValue(label) || this.linkLabel(cleanType);\n      if (!links.some(l => l.type === cleanType && l.url === cleanUrl && l.label === cleanLabel)) links.push({ type: cleanType, label: cleanLabel, url: cleanUrl, color });\n    };\n    defs.forEach(d => push(d.type, d.label, this.firstText(row, d.keys), 'blue'));\n    const rawLinks = row.links;\n    if (Array.isArray(rawLinks)) {\n      rawLinks.forEach(l => push(l && l.type, l && l.label, l && (l.url || l.href || l.link), l && l.color));\n    } else if (rawLinks && typeof rawLinks === 'object') {\n      Object.keys(rawLinks).forEach(type => {\n        const v = rawLinks[type];\n        if (typeof v === 'string') push(type, this.linkLabel(type), v, 'blue');\n        else if (v && typeof v === 'object') push(v.type || type, v.label || this.linkLabel(type), v.url || v.href || v.link, v.color);\n      });\n    }\n    const generic = this.firstText(row, ['report_url','link_url','url']);\n    if (generic) push('generic', this.firstText(row, ['report_label','link_label','label']) || 'Открыть ссылку', generic, 'blue');\n    return links;\n  }\n\n  openUrl(url) {\n    const cleanUrl = this.textValue(url);\n    if (!cleanUrl || typeof window === 'undefined') return;\n    window.open(cleanUrl, '_blank', 'noopener,noreferrer');\n  }\n\n  periodRank(period) {\n    const s = String(period || '').trim();\n    if (!s) return null;\n    let m = s.match(/^([0-9]{4})[ _-]*Q([1-4])$/i) || s.match(/^([0-9]{4})[ ]+([1-4])$/);\n    if (m) return Number(m[1]) * 12 + Number(m[2]) * 3;\n    m = s.match(/^Q([1-4])[ ]*([0-9]{4})$/i);\n    if (m) return Number(m[2]) * 12 + Number(m[1]) * 3;\n    const roman = { I:1, II:2, III:3, IV:4 };\n    m = s.match(/(IV|III|II|I|[1-4])[ ]*кв[.]?[ ]*([0-9]{4})/i);\n    if (m) {\n      const q = roman[m[1].toUpperCase()] || Number(m[1]);\n      return Number(m[2]) * 12 + q * 3;\n    }\n    m = s.match(/([0-9]{4})[ ]*(?:г[.]?)?[ ]*(IV|III|II|I|[1-4])[ ]*кв/i);\n    if (m) {\n      const q = roman[m[2].toUpperCase()] || Number(m[2]);\n      return Number(m[1]) * 12 + q * 3;\n    }\n    const d = new Date(s);\n    if (!Number.isNaN(d.getTime())) return d.getFullYear() * 12 + d.getMonth() + 1 + d.getDate() / 40;\n    return null;\n  }\n\n  normalizeDDData(data) {\n    const rawRows = Array.isArray(data) ? data : (Array.isArray(data && data.rows) ? data.rows : []);\n    if (!rawRows.length) throw new Error('нет строк с метриками');\n\n    const periodMap = new Map();\n    rawRows.forEach((row, order) => {\n      const period = String(row.period ?? '').trim();\n      if (!periodMap.has(period)) periodMap.set(period, { period, order, rank: this.periodRank(period) });\n    });\n    const periods = Array.from(periodMap.values());\n    const hasRank = periods.some(p => p.rank !== null);\n    periods.sort((a, b) => {\n      const ar = hasRank ? (a.rank === null ? -Infinity : a.rank) : a.order;\n      const br = hasRank ? (b.rank === null ? -Infinity : b.rank) : b.order;\n      return ar === br ? a.order - b.order : ar - br;\n    });\n    const latest = periods[periods.length - 1];\n    const rows = rawRows.filter(row => String(row.period ?? '').trim() === latest.period);\n\n    const productsById = new Map();\n    const index = {};\n    let count = 0;\n    rows.forEach(row => {\n      const productGroupId = String(row.product_group_uuid ?? '').trim();\n      const metric = String(row.metric ?? '').trim();\n      const productName = String(row.product_name ?? productGroupId).trim() || productGroupId;\n      if (!productGroupId || !productName || !metric) return;\n      const productId = productGroupId + '¦' + productName;\n      if (!productsById.has(productId)) productsById.set(productId, { id: productId, name: productName, groupId: productGroupId });\n      const applicable = this.parseApplicable(row);\n      const maxValue = this.parseNumber(row.max_value, null);\n      const rawValue = this.parseNumber(row.value, 0);\n      const lossHunterCount = this.parseNumber(this.firstText(row, ['losshunter_analytics_count','losshunter_analytics_cnt','losshunter_count','loss_hunter_analytics_count','loss_hunter_analytics_cnt','loss_hunter_count','losshunter_analysis_count','loss_hunter_analysis_count','analytics_count']), null);\n      const knowAboutGoalsNavigator = this.parseOptionalBoolean(row.know_about_goals_navigator);\n      index[productId + '¦' + metric] = {\n        applicable,\n        value: rawValue,\n        max: maxValue === null ? null : Math.max(0, maxValue),\n        links: this.metricLinks(row),\n        lossHunterCount,\n        knowAboutGoalsNavigator,\n      };\n      count += 1;\n    });\n\n    const products = Array.from(productsById.values());\n    if (!products.length) throw new Error('в актуальном периоде нет продуктов');\n    return { index, products, period: latest.period, count, totalRows: rawRows.length };\n  }\n\n  async refreshDD() {\n    this.setState({ ddStatus: { text: 'Обновление dd-data.json…', color: '#86868b' } });\n    try {\n      const r = await fetch(DD_DATA_URL + '?_=' + Date.now(), { cache: 'no-store' });\n      if (!r.ok) throw new Error('HTTP ' + r.status);\n      const data = await r.json();\n      const dd = this.normalizeDDData(data);\n      const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });\n      this.setState(s => {\n        const productIds = new Set(dd.products.map(p => p.id));\n        const selected = (s.selected || []).filter(id => productIds.has(id));\n        return {\n          dd,\n          selected: selected.length ? selected : dd.products.slice(0, 1).map(p => p.id),\n          ddStatus: { text: 'Обновлено ' + now + ' · dd-data.json · ' + dd.count + ' метрик', color: '#248A3D' },\n        };\n      });\n    } catch (e) {\n      const msg = e && e.message ? e.message : String(e);\n      this.setState({\n        dd: null,\n        selected: [],\n        ddStatus: { text: 'dd-data.json недоступен: ' + msg, color: '#d70015' },\n      });\n    }\n  }\n\n  toggle(id) {\n    this.setState(s => {\n      const has = s.selected.includes(id);\n      if (has && s.selected.length === 1) return s;\n      return { ...s, selected: has ? s.selected.filter(x => x !== id) : [...s.selected, id] };\n    });\n  }\n\n  setView(mode) {\n    this.setState({ viewMode: mode, collapsed: {} });\n  }\n\n  toggleBlock(key) {\n    this.setState(s => {\n      const cur = s.collapsed[key];\n      const isCollapsed = cur === undefined ? (this.defaultCollapsed || []).includes(key) : cur;\n      return { collapsed: { ...s.collapsed, [key]: !isCollapsed } };\n    });\n  }\n\n  openFeedback(blockName, e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState({ feedback: { open:true, blockName, text:'', sent:false } });\n  }\n\n  closeFeedback() {\n    this.setState(s => ({ feedback: { ...(s.feedback || {}), open:false } }));\n  }\n\n  setFeedbackText(value) {\n    this.setState(s => ({ feedback: { ...(s.feedback || {}), text:value, sent:false } }));\n  }\n\n  sendFeedback() {\n    this.setState(s => ({ feedback: { ...(s.feedback || {}), sent:true } }));\n  }\n\n  renderVals() {\n    // ----- tweakable theming -----\n    const accent = this.props.accent ?? 'Зелёный Сбер';\n    const density = this.props.density ?? 'Просторный';\n    const detailFocus = (this.props.detail ?? 'Подробно') === 'Фокус';\n    const ACCENTS = {\n      'Зелёный Сбер': { brand:'#21A038', grad:'linear-gradient(160deg,#2bb84a,#178a2c)', cta:'linear-gradient(135deg,#12301f,#1d6b35)', btn:'#178a2c', soft:'rgba(33,160,56,.1)' },\n      'Индиго':       { brand:'#4f46e5', grad:'linear-gradient(160deg,#6366f1,#4338ca)', cta:'linear-gradient(135deg,#1e1b4b,#4338ca)', btn:'#4338ca', soft:'rgba(79,70,229,.1)' },\n      'Графит':       { brand:'#3f4045', grad:'linear-gradient(160deg,#6b6d73,#3a3b40)', cta:'linear-gradient(135deg,#1c1c1f,#3f4045)', btn:'#3a3b40', soft:'rgba(63,64,69,.1)' },\n    };\n    const A = ACCENTS[accent] || ACCENTS['Зелёный Сбер'];\n    const ui = {\n      brand: A.brand, brandGrad: A.grad, ctaGrad: A.cta, btnText: A.btn, btnSoft: A.soft,\n      gap: density === 'Компактный' ? '11px' : '16px',\n      cardPad: density === 'Компактный' ? '15px 16px' : '20px 22px',\n    };\n\n    // ----- DD-rating model (from survey workbook) -----\n    const BLOCKS = [\n      { key:'general', name:'Самооценка знания продуктовых метрик',\n        note:{ skill:'Навык «Ключевые метрики»', metric:'Общий светофор', btn:'Перейти' },\n        crit:[\n          { code:'general.market_ru', n:'Объем целевого рынка в России', h:'Оценка потенциала рынка в России', max:0.2, group:'Знание собственных метрик' },\n          { code:'general.market_sber', n:'Объем целевого рынка в Сбере', h:'Оценка потенциала внутри клиентской базы Сбера', max:0.2 p.name, score:sc, scoreColor:lv.color, onToggle: () => this.toggle(p.id),\n        border: sel?'rgba(33,160,56,.4)':'rgba(0,0,0,.1)', bg: sel?'rgba(33,160,56,.08)':'#fff',\n        checkBorder: sel?'#21A038':'rgba(0,0,0,.2)', checkBg: sel?'#21A038':'transparent', check: sel?'✓':'' };\n    };\n\n    const selectedIds = selected.filter(id => byId[id]);\n    const selectedChips = selectedIds.map(id => chipBase(byId[id], true));\n    const q = query.trim().toLowerCase();\n    const hasQuery = q.length > 0;\n    const resultChips = hasQuery ? products.filter(p => p.name.toLowerCase().includes(q)).map(p => chipBase(p, selectedIds.includes(p.id))) : [];\n\n    const selectedGroups = new Set(selectedIds.map(id => byId[id] && byId[id].groupId).filter(Boolean));\n    const suggestChips = (!hasQuery && selectedGroups.size)\n      ? products.filter(p => !selectedIds.includes(p.id) && selectedGroups.has(p.groupId)).map(p => chipBase(p, false))\n      : [];\n    const hasSuggest = suggestChips.length > 0;\n\n    const selProducts = selectedIds.map(id => byId[id]);\n    const isSingle = selProducts.length === 1;\n    const isCompare = selProducts.length > 1;\n\n    let single = null;\n    if (isSingle) {\n      const p = selProducts[0]; const cp = computeP(p); const lv = levelOf(cp.score);\n      const blocks = cp.blocks.map(b => ({ ...b, expanded: isExp(b.key), chevron: isExp(b.key) ? '▾' : '▸', onToggle: () => this.toggleBlock(b.key), onFeedback: (e) => this.openFeedback(b.name, e) }));\n      let focusRows = [];\n      cp.blocks.forEach(b => {\n        b.crit.forEach(r => {\n          if (!r.excludedFromIndex && r.applicable && r.max > 0 && r.gap > 0) {\n            focusRows.push({ block:b, row:r, gainPct:Math.round(r.gap/(cp.max||1)*100) });\n          }\n        });\n      });\n      const focuses = focusRows.sort((a,b) => (b.row.gap - a.row.gap) || (b.gainPct - a.gainPct)).slice(0,3).map((f,i) => ({\n        idx:i+1, name:f.block.name, current:fmt(f.row.earned)+' / '+fmt(f.row.max), action:recommendationFor(f.row, f.block.name),\n        gain:'+'+f.gainPct+' п.п.', color:ui.btnText, gainColor:ui.btnText, gainBg:ui.btnSoft\n      }));\n      if (!focuses.length) focuses.push({ idx:'✓', name:'Все применимые метрики', current:'без просадок', action:'Сохранить текущий уровень и мониторить обновления JSON', gain:'0 п.п.', color:ui.btnText, gainColor:ui.btnText, gainBg:ui.btnSoft });\n      single = { name:p.name, score:cp.score, level:lv.level, levelColor:lv.color, ring:ringOf(cp.score, lv.color), barPct: cp.score + '%',\n        hasDelta:false, delta:'', deltaColor:'#86868b',\n        earnedTxt:fmt(cp.earned), maxTxt:fmt(cp.max), blocks, focuses, easyWins:cp.easyWins || [], hasEasyWins:(cp.easyWins || []).length > 0, ui };\n    }\n\n    let compare = null, gridCols = '1.4fr';\n    if (isCompare) {\n      gridCols = '220px ' + selProducts.map(()=>'minmax(150px,1fr)').join(' ');\n      const cps = selProducts.map(p => ({ p, cp: computeP(p) }));\n      const cmpProducts = cps.map(({p,cp}) => { const lv = levelOf(cp.score);\n        return { name:p.name, score:cp.score, level:lv.level, levelColor:lv.color, hasDelta:false, delta:'', deltaColor:'#86868b' }; });\n      const rows = BLOCKS.map((b, bi) => ({\n        name: b.name, maxTxt: fmt(b.crit.reduce((s,c)=>s+(criterionExcludedFromIndex(c) ? 0 : c.max),0)),\n        cells: cps.map(({cp}) => { const blk = cp.blocks[bi]; const lv = levelOf(blk.max? blk.earned/blk.max*100:0);\n          return { earnedTxt:blk.earnedTxt, maxTxt:blk.maxTxt, scoreText:blk.scoreText, barPct:blk.barPct, color:lv.color }; })\n      }));\n      compare = { products: cmpProducts, rows };\n    }\n\n    return {\n      onRefresh: () => this.refreshDD(),\n      ddStatus: this.state.ddStatus,\n      periodLabel: (dd && dd.period) ? dd.period : 'dd-data.json',\n      query, onSearch: (e) => this.setState({ query: e.target.value }),\n      feedback: this.state.feedback || { open:false, blockName:'', text:'', sent:false },\n      onFeedbackClose: () => this.closeFeedback(),\n      onFeedbackSend: () => this.sendFeedback(),\n      onFeedbackText: (e) => this.setFeedbackText(e.target.value),\n      selectedChips, selectedCount: selectedIds.length,\n      hasQuery, resultChips, resultCount: resultChips.length,\n      hasSuggest, suggestChips,\n      hasNoData: products.length === 0,\n      emptyTitle: dd ? 'В актуальном периоде нет продуктов' : 'dd-data.json не загружен',\n      emptyText: dd ? 'Проверьте строки JSON для выбранного периода.' : 'Файл должен лежать рядом с Agent.html и быть доступен браузеру.',\n      isSingle, isCompare, single, compare, gridCols, ui,\n      viewMode, setView: (m) => this.setView(m),\n      vbDetail: { color: viewMode==='Подробно'?'#1d1d1f':'#86868b', bg: viewMode==='Подробно'?'#fff':'transparent', sh: viewMode==='Подробно'?'0 1px 3px rgba(0,0,0,.12)':'none' },\n      vbCompact: { color: viewMode==='Компактно'?'#1d1d1f':'#86868b', bg: viewMode==='Компактно'?'#fff':'transparent', sh: viewMode==='Компактно'?'0 1px 3px rgba(0,0,0,.12)':'none' },\n      onDetail: () => this.setView('Подробно'), onCompact: () => this.setView('Компактно'),\n    };\n  }\n}\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"</script>
